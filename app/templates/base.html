<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ContractExtract{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
    nav { background: #1e293b; padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    nav a { color: #cbd5e1; text-decoration: none; font-size: .9rem; }
    nav a:hover { color: #fff; }
    nav .brand { color: #38bdf8; font-weight: 700; font-size: 1.1rem; margin-right: auto; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .flash { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
    .flash.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .flash.danger  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .flash.warning { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
    .flash.info    { background: #e0f2fe; color: #075985; border: 1px solid #7dd3fc; }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 4px; font-size: .8rem; font-weight: 600; }
    .badge-processing { background: #fef9c3; color: #854d0e; }
    .badge-ready      { background: #dcfce7; color: #166534; }
    .badge-approved   { background: #dbeafe; color: #1e40af; }
    .badge-failed     { background: #fee2e2; color: #991b1b; }
    .btn { display: inline-block; padding: .5rem 1.1rem; border: none; border-radius: 6px; font-size: .9rem; cursor: pointer; text-decoration: none; font-weight: 600; }
    .btn-primary  { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-success  { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger   { background: #ef4444; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; margin-top: 1rem; }
    th, td { border: 1px solid #e2e8f0; padding: .6rem .8rem; text-align: left; }
    th { background: #f1f5f9; font-weight: 600; }
    tr:nth-child(even) td { background: #fafafa; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.5rem; }
  </style>
</head>
<body>
<nav>
  <span class="brand">📄 ContractExtract</span>
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('upload.index') }}">Upload</a>
    <a href="{{ url_for('review.list_docs') }}">Review</a>
    <a href="{{ url_for('auth.logout') }}">Logout ({{ current_user.username }})</a>
  {% endif %}
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
