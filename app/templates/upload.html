<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Contract UI</title>
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f2f3f5; /* Light gray background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #111827;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 700px;
      padding: 20px;
    }

    /* Header Styles */
    .header-subtitle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: #4b5563;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .logo-icon {
      color: #dc2626; /* Red brand color */
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 40px;
      color: #0f172a;
    }

    /* Dropzone Styles */
    .upload-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      padding: 70px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: transparent;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .upload-zone:hover {
      background-color: #e2e8f0;
      border-color: #94a3b8;
    }

    .icon-container {
      background-color: #e2e8f0;
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .upload-icon {
      color: #334155;
    }

    .primary-text {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .secondary-text {
      font-size: 0.95rem;
      color: #64748b;
    }

    /* Footer Styles */
    .supported-formats {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 0.85rem;
      color: #64748b;
      letter-spacing: 0.5px;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .upload-zone {
        padding: 50px 20px;
      }
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="header-subtitle">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z" />
          <path d="M4 4l3 3" />
          <path d="M20 4l-3 3" />
        </svg>
        <span>Nord Mobile &bull; Sweden</span>
      </div>
      <h1>Upload a contract to extract</h1>
    </header>

    <div class="upload-zone">
      <div class="icon-container">
        <svg class="upload-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </div>
      <p class="primary-text">Drag & drop your contract here</p>
      <p class="secondary-text">or click to browse &mdash; PDF, DOCX, PNG, JPG</p>
    </div>

    <div class="supported-formats">
      <span>PDF</span>
      <span>DOCX</span>
      <span>PNG</span>
      <span>XLSX</span>  
      <span>JPG</span>
      <span>TIFF</span>
    </div>
  </div>

</body>
</html>
