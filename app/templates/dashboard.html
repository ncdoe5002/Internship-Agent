<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EDCH - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center">
        <div class="card shadow-lg p-5">
            <h1 class="text-success mb-4">Login Successful!</h1>
            
            <!-- This is where we inject the variable passed from the route -->
            <h3>Welcome, <strong>{{ username }}</strong></h3>
            
            <hr class="my-4">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger">Log Out</a>
        </div>
    </div>
</body>
</html>
