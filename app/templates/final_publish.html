<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Publish Status</title>
  <style>
    /* Reset and Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f2f3f5;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; color: #111827;
      flex-direction: column;
    }
    .container { width: 100%; max-width: 600px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

    /* Spinner Styles */
    .spinner-wrapper { position: relative; width: 64px; height: 64px; margin-bottom: 24px; transition: opacity 0.3s; }
    .spinner-wrapper.hidden { display: none; }
    .spinner-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fee2e2; }
    .spinner-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top-color: #dc2626; animation: spin 1s linear infinite; }
    
    .logo-center { 
      position: absolute; 
      top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      width: 28px; height: 28px; 
      object-fit: contain;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Typography */
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: #0f172a; text-align: center; }
    .subtitle { font-size: 0.95rem; color: #6b7280; margin-bottom: 32px; text-align: center; }

    /* Card Styles */
    .status-card { width: 100%; background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); overflow: hidden; border-top: 4px solid #dc2626; }
    .status-list { list-style: none; width: 100%; }
    
    /* List Items */
    .status-item { display: flex; align-items: center; padding: 20px 24px; border-bottom: 1px solid #f3f4f6; gap: 16px; transition: all 0.3s ease; }
    .status-item:last-child { border-bottom: none; }
    .item-text { font-size: 1rem; font-weight: 400; }

    /* States */
    .status-item[data-state="pending"] .item-text { color: #9ca3af; }
    .status-item[data-state="processing"] .item-text { color: #4b5563; }
    .status-item[data-state="completed"] .item-text { color: #111827; }
    .status-item[data-state="error"] .item-text { color: #dc2626; }

    /* Icons */
    .icon-wrapper { width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .status-item[data-state="completed"] .icon-wrapper { background-color: #dcfce7; color: #16a34a; }
    .status-item[data-state="error"] .icon-wrapper { background-color: #fee2e2; color: #dc2626; }
    .status-item[data-state="processing"] .icon-wrapper,
    .status-item[data-state="pending"] .icon-wrapper { background-color: #f3f4f6; }
    
    /* Processing dots */
    .status-item[data-state="pending"] .dot { width: 6px; height: 6px; border-radius: 50%; background-color: #d1d5db; }
    .status-item[data-state="processing"] .dot { width: 6px; height: 6px; border-radius: 50%; background-color: #dc2626; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Return Button Styles */
    .return-button {
      margin-top: 32px;
      padding: 12px 32px;
      background-color: #111827;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: none; /* Hidden until complete */
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .return-button:hover {
      background-color: #374151;
      transform: translateY(-1px);
    }
    .return-button.visible {
      display: inline-flex;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="spinner-wrapper" id="main-spinner">
      <div class="spinner-bg"></div>
      <div class="spinner-progress"></div>
      <!-- Add your actual static logo path here -->
      <img src="{{ url_for('static', filename='images/Logo-EDCH.png') }}" alt="Logo" class="logo-center" onerror="this.style.display='none'">
    </div>
    
    <h1 id="main-title">Publishing to Production</h1>
    <p class="subtitle" id="subtitle-display">Migrating Document ID: {{ document.id }}</p>

    <div class="status-card">
      <ul class="status-list" id="status-list"></ul>
    </div>

    <!-- Returns to the main MNO dashboard -->
    <a href="{{ url_for('auth.dashboard') }}" class="return-button" id="return-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Return to Dashboard
    </a>
  </div>

  <script>
    class DatabasePublishUI {
      constructor(config) {
        this.listElement = document.getElementById(config.listElementId);
        this.titleElement = document.getElementById(config.titleElementId);
        this.subtitleElement = document.getElementById(config.subtitleElementId);
        this.spinnerElement = document.getElementById(config.spinnerElementId);
        this.returnBtn = document.getElementById(config.returnBtnId);
        
        this.icons = {
          check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
          error: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
          dot: `<div class="dot"></div>`
        };

        this.steps = new Map();
        config.initialSteps.forEach((step, index) => {
          this.steps.set(index, { id: step.id, label: step.label, state: 'pending' }); 
        });

        this.renderAll();
      }

      updateStepByIndex(index, newState) {
        if (!this.steps.has(index)) return;
        const step = this.steps.get(index);
        step.state = newState;
        
        const listItem = document.getElementById(`step-${step.id}`);
        if (listItem) {
          listItem.setAttribute('data-state', newState);
          const iconWrapper = listItem.querySelector('.icon-wrapper');
          if (newState === 'completed') iconWrapper.innerHTML = this.icons.check;
          else if (newState === 'error') iconWrapper.innerHTML = this.icons.error;
          else iconWrapper.innerHTML = this.icons.dot;
        }
      }

      completeProcess(success = true) {
        this.spinnerElement.classList.add('hidden');
        if (success) {
            this.titleElement.textContent = "Successfully Published!";
            this.titleElement.style.color = "#16a34a";
            this.subtitleElement.textContent = "All records have been moved to production.";
            this.returnBtn.classList.add('visible');
        } else {
            this.titleElement.textContent = "Publishing Failed";
            this.titleElement.style.color = "#dc2626";
            this.subtitleElement.textContent = "Check system logs for details.";
            this.returnBtn.classList.add('visible');
            this.returnBtn.textContent = "Go Back";
            this.returnBtn.style.backgroundColor = "#dc2626";
        }
      }

      renderAll() {
        this.listElement.innerHTML = '';
        this.steps.forEach((stepData, index) => {
          const li = document.createElement('li');
          li.id = `step-${stepData.id}`;
          li.className = 'status-item';
          li.setAttribute('data-state', stepData.state);
          li.innerHTML = `
            <div class="icon-wrapper">${this.icons.dot}</div>
            <span class="item-text">${stepData.label}</span>
          `;
          this.listElement.appendChild(li);
        });
      }
    }

    // Initialize UI
    const publishUI = new DatabasePublishUI({
      listElementId: 'status-list',
      titleElementId: 'main-title',
      subtitleElementId: 'subtitle-display',
      spinnerElementId: 'main-spinner',
      returnBtnId: 'return-btn',
      initialSteps: [
        { id: 'validate', label: 'Validating signed report constraints' },
        { id: 'header', label: 'Migrating AgmtHeaderStg & AgmtModelsStg' },
        { id: 'rates', label: 'Inserting AgmtMdlNormalStg rates' },
        { id: 'commitments', label: 'Verifying AgmtCommitment entries' },
        { id: 'finalize', label: 'Committing transaction to production DB' }
      ]
    });

    // Simulate the database steps natively in the browser
    let currentStep = 0;
    const totalSteps = 5;
    
    publishUI.updateStepByIndex(currentStep, 'processing');

    const simulateProgress = setInterval(() => {
      publishUI.updateStepByIndex(currentStep, 'completed');
      currentStep++;
      
      if (currentStep < totalSteps) {
        publishUI.updateStepByIndex(currentStep, 'processing');
      } else {
        clearInterval(simulateProgress);
        publishUI.completeProcess(true); // Show success UI
      }
    }, 1200); // Wait 1.2 seconds between each fake database step
  </script>
</body>
</html>
